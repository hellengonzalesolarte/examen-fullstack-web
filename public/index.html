<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catalogo Adidas CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-success">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">Adidas CRUD</a>
        <span class="navbar-text text-light small">Node.js + Express + MongoDB</span>
      </div>
    </nav>

    <header class="hero-section text-white">
      <div class="container py-5">
        <div class="row align-items-center g-4">
          <div class="col-lg-8">
            <p class="text-uppercase fw-semibold mb-2 hero-kicker">Catalogo deportivo</p>
            <h1 class="display-5 fw-bold mb-3">Catalogo Adidas CRUD</h1>
            <p class="lead mb-0">
             </p>
          </div>
          <div class="col-lg-4">
            <div class="summary-panel">
              <span class="summary-label">Productos registrados</span>
              <strong id="totalProductos">0</strong>
              <span class="summary-note">Datos cargados desde MongoDB</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="container py-4 py-lg-5">
      <section class="row g-4">
        <div class="col-lg-5">
          <div class="card shadow-sm form-card">
            <div class="card-body p-4">
              <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
                <h2 class="h5 fw-bold mb-0">Registrar / editar producto Adidas</h2>
                <span class="badge text-bg-success">CRUD</span>
              </div>

              <div id="mensaje" class="alert d-none" role="alert"></div>

              <form id="formProducto" class="row g-3">
                <input type="hidden" id="productoId">

                <div class="col-md-12">
                  <label for="nombreProducto" class="form-label">Nombre del producto</label>
                  <input type="text" class="form-control" id="nombreProducto" required>
                </div>

                <div class="col-md-6">
                  <label for="categoria" class="form-label">Categoria</label>
                  <input type="text" class="form-control" id="categoria" required>
                </div>

                <div class="col-md-6">
                  <label for="linea" class="form-label">Linea</label>
                  <input type="text" class="form-control" id="linea" required>
                </div>

                <div class="col-md-6">
                  <label for="deporte" class="form-label">Deporte</label>
                  <input type="text" class="form-control" id="deporte" required>
                </div>

                <div class="col-md-3">
                  <label for="precio" class="form-label">Precio</label>
                  <input type="number" class="form-control" id="precio" min="0" step="0.01" required>
                </div>

                <div class="col-md-3">
                  <label for="stock" class="form-label">Stock</label>
                  <input type="number" class="form-control" id="stock" min="0" step="1" required>
                </div>

                <div class="col-md-6">
                  <label for="tallaDisponible" class="form-label">Talla disponible</label>
                  <input type="text" class="form-control" id="tallaDisponible" required>
                </div>

                <div class="col-md-6">
                  <label for="colorPrincipal" class="form-label">Color principal</label>
                  <input type="text" class="form-control" id="colorPrincipal" required>
                </div>

                <div class="col-md-6">
                  <label for="material" class="form-label">Material</label>
                  <input type="text" class="form-control" id="material" required>
                </div>

                <div class="col-md-6">
                  <label for="estado" class="form-label">Estado</label>
                  <select class="form-select" id="estado" required>
                    <option value="Disponible">Disponible</option>
                    <option value="Agotado">Agotado</option>
                    <option value="Edicion limitada">Edicion limitada</option>
                  </select>
                </div>

                <div class="col-md-12">
                  <label for="imagenUrl" class="form-label">URL de imagen</label>
                  <input type="url" class="form-control" id="imagenUrl" placeholder="https://...">
                </div>

                <div class="col-md-12">
                  <label for="descripcion" class="form-label">Descripcion</label>
                  <textarea class="form-control" id="descripcion" rows="3" required></textarea>
                </div>

                <div class="col-12 d-flex flex-column flex-sm-row gap-2">
                  <button type="submit" class="btn btn-primary flex-fill" id="btnGuardar">
                    <span id="textoBotonGuardar">Guardar producto</span>
                  </button>
                  <button type="button" class="btn btn-outline-secondary flex-fill" id="btnLimpiar">
                    Limpiar formulario
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-3">
            <div>
              <h2 class="h4 fw-bold mb-1">Productos registrados</h2>
              <p class="text-secondary mb-0">Listado actualizado dinamicamente desde la API.</p>
            </div>
            <button type="button" class="btn btn-success" id="btnRecargar">Recargar listado</button>
          </div>

          <div id="contenedorProductos" class="row row-cols-1 row-cols-xl-2 g-3"></div>
        </div>
      </section>
    </main>

    <footer class="py-4 border-top bg-white">
      <div class="container text-center text-secondary small">
        API principal: <strong>/api/adidas</strong>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
